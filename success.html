<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Message Sent</title>


    <style>

        * {

            margin: 0;

            padding: 0;

            box-sizing: border-box;

        }


        body {

            height: 100vh;

            display: flex;

            justify-content: center;

            align-items: center;

            background-color: #efefef;

            font-family: Arial, sans-serif;

        }


        .success-box {

            background-color: white;

            padding: 50px;

            border-radius: 10px;

            text-align: center;

            box-shadow:
                0 10px 30px
                rgba(0, 0, 0, 0.2);

        }


        .success-box h1 {

            color: #0d6efd;

            margin-bottom: 20px;

        }


        .success-box p {

            margin-bottom: 30px;

        }


        .success-box a {

            display: inline-block;

            padding: 12px 25px;

            background-color: black;

            color: white;

            text-decoration: none;

            border-radius: 5px;

        }


        .success-box a:hover {

            background-color: #0d6efd;

        }

    </style>

</head>


<body>


    <div class="success-box">


        <h1>Message Sent Successfully!</h1>


        <p>

            Thank you for contacting me.
            I will get back to you soon.

        </p>


        <a href="/">

            Return to Portfolio

        </a>


    </div>


</body>

</html>
